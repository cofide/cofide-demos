apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments
  labels:
    app: payments
    demo: cofide-capital
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  labels:
    app: payments
    demo: cofide-capital
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
      demo: cofide-capital
  template:
    metadata:
      labels:
        app: payments
        demo: cofide-capital
    spec:
      serviceAccountName: payments
      containers:
      - name: payments
        image: ghcr.io/cofide/cofide-demos/cofide-capital/payments:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: LEDGER_URL
          value: http://ledger:8080
        - name: REDIS_ADDR
          value: redis:6379
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payments
  labels:
    app: payments
    demo: cofide-capital
spec:
  selector:
    app: payments
    demo: cofide-capital
  ports:
  - name: http
    port: 8080
    targetPort: 8080
