apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
  labels:
    app: loadgen
    demo: cofide-capital
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgen
      demo: cofide-capital
  template:
    metadata:
      labels:
        app: loadgen
        demo: cofide-capital
    spec:
      serviceAccountName: frontend
      containers:
      - name: loadgen
        image: ghcr.io/cofide/cofide-demos/cofide-capital/loadgen:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: PAYMENTS_URL
          value: http://payments:8080
        - name: REDIS_ADDR
          value: redis:6379
        resources:
          requests:
            cpu: 25m
            memory: 48Mi
