apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      containers:
      - name: frontend
        env:
        - name: COFIDE_CAPITAL_VERSION
          value: v1
        - name: PAYMENTS_API_KEY
          valueFrom:
            secretKeyRef:
              name: cofide-capital-secrets
              key: payments-api-key
