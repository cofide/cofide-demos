apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger
spec:
  template:
    spec:
      containers:
      - name: ledger
        env:
        - name: COFIDE_CAPITAL_VERSION
          value: v1
        - name: LEDGER_API_KEY
          valueFrom:
            secretKeyRef:
              name: cofide-capital-secrets
              key: ledger-api-key
