apiVersion: v1
kind: ServiceAccount
metadata:
  name: ping-pong-server
  labels:
    app: ping-pong-server
    type: exchange
---
apiVersion: v1
kind: Service
metadata:
  name: ping-pong-server
  labels:
    app: ping-pong-server
    type: exchange
spec:
  selector:
    app: ping-pong-server
    type: exchange
  ports:
    - name: http
      port: 8443
      targetPort: 8443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong-server
      type: exchange
  template:
    metadata:
      labels:
        app: ping-pong-server
        type: exchange
    spec:
      serviceAccountName: ping-pong-server
      containers:
        - name: ping-pong-server
          image: ghcr.io/cofide/cofide-demos/ping-pong-exchange:${IMAGE_TAG}
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
          env:
            - name: PING_PONG_MODE
              value: server
            - name: ACTOR_SPIFFE_ID
              value: ${ACTOR_SPIFFE_ID}
            - name: CLIENT_SPIFFE_ID
              value: ${CLIENT_SPIFFE_ID}
            - name: EXCHANGE_URL
              value: ${EXCHANGE_URL}
            - name: SPIFFE_ENDPOINT_SOCKET
              value: unix:///spiffe-workload-api/spire-agent.sock
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
