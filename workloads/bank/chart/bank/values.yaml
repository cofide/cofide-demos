# authMode toggles every hop in the demo between a pre-shared static secret
# ("static", the world before Cofide Connect) and SPIFFE-issued identity
# ("spiffe", after onboarding into Connect). Flipping it requires a
# `helm upgrade` followed by a rollout restart, since the SPIFFE Workload API
# socket is mounted at pod start.
authMode: static

image:
  prefix: ko.local/
  tag: latest
  pullPolicy: Never

# Only used when authMode is "spiffe". These must match the SPIFFE IDs
# registered for each workload in your trust domain.
spiffe:
  socketPath: unix:///spiffe-workload-api/spire-agent.sock
  serverSpiffeId: ""
  clientSpiffeId: ""
  lambdaSpiffeId: ""
  agentSpiffeId: ""

# Only used when authMode is "static". Change these before deploying to a
# shared cluster.
staticAuth:
  clientApiKey: "changeme-client-key"
  webhookApiKey: "changeme-webhook-key"
  agentApiKey: "changeme-agent-key"

# Cofide Credex's OIDC discovery endpoint, used by bank-server to validate
# bank-agent's delegated tokens. Only used when authMode is "spiffe" —
# distinct from bank-agent's own Credex integration, which is configured in
# workloads/bank/terraform/agentcore.tf, not here.
credex:
  discoveryUrl: ""

# OIDC sign-in, powering the dashboard's chat feature. Any OIDC-compliant
# IdP works here (Ory, Auth0, Okta, ...) — nothing below is IdP-specific.
# Required in both auth modes — signing in as a customer is orthogonal to
# the static/SPIFFE toggle for the bank-client/bank-agent -> bank-server
# hops. bank-client is registered as a public OAuth2 client (PKCE, no client
# secret) — one less static secret to manage, consistent with the rest of
# this demo.
oidc:
  discoveryUrl: ""
  clientId: ""
  redirectUrl: ""

# bank-agent runs on AWS Bedrock AgentCore, not in this cluster — this is
# just where bank-client sends chat questions. See workloads/bank/terraform.
bankAgent:
  invokeUrl: ""

session:
  # Signs bank-client's session cookie. Change before deploying to a shared
  # cluster.
  secret: "changeme-session-secret"

server:
  clientApiPort: 8443
  # bank-lambda and bank-agent (both running in AWS) share this listener —
  # different routes (/webhook/transactions, /api/summary), different auth,
  # one port to expose. ClusterIP is enough for bank-client, which runs in
  # the same cluster and uses clientApiPort instead; set this to LoadBalancer
  # (a real cloud cluster) or NodePort (a local kind cluster fronted by a
  # tunnel — see the README) so bank-lambda/bank-agent can reach it.
  webhookPort: 8444
  webhookServiceType: ClusterIP
  # Only used when webhookServiceType is NodePort. Must be within the
  # cluster's NodePort range and match whatever's tunnelled to your host
  # (e.g. a kind extraPortMappings entry).
  webhookNodePort: ""

client:
  listenPort: 8080
  # ClusterIP + kubectl port-forward is enough for a local demo; set to
  # LoadBalancer to open the dashboard directly in a browser.
  serviceType: ClusterIP

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
