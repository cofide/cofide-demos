{{- if eq .Values.authMode "static" }}
apiVersion: v1
kind: Secret
metadata:
  name: bank-server-auth
  labels:
    {{- include "bank.labels" . | nindent 4 }}
type: Opaque
stringData:
  STATIC_CLIENT_API_KEY: {{ .Values.staticAuth.clientApiKey | quote }}
  STATIC_WEBHOOK_API_KEY: {{ .Values.staticAuth.webhookApiKey | quote }}
  STATIC_AGENT_API_KEY: {{ .Values.staticAuth.agentApiKey | quote }}
{{- end }}
---
# bank-client's secret is always rendered — OIDC sign-in and the session
# signing key apply in both auth modes, unlike bank-server's static keys
# above, which only exist in static mode.
apiVersion: v1
kind: Secret
metadata:
  name: bank-client-auth
  labels:
    {{- include "bank.labels" . | nindent 4 }}
type: Opaque
# data, not stringData: the Kubernetes API server merges stringData keys into
# data on write without ever removing keys omitted from stringData (see
# `kubectl explain secret.stringData`), so a key present in the "static"
# stringData block would survive forever, even across later "spiffe"-mode
# upgrades that stop setting it. data is a plain field with normal replace
# semantics under Helm's 3-way merge patch, so an omitted key is actually
# removed.
data:
  {{- if eq .Values.authMode "static" }}
  STATIC_CLIENT_API_KEY: {{ .Values.staticAuth.clientApiKey | b64enc }}
  {{- end }}
  SESSION_SECRET: {{ .Values.session.secret | b64enc }}
