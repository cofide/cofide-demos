{{- if eq .Values.authMode "static" }}
apiVersion: v1
kind: Secret
metadata:
  name: bank-server-auth
  labels:
    {{- include "bank.labels" . | nindent 4 }}
type: Opaque
stringData:
  STATIC_CLIENT_API_KEY: {{ .Values.staticAuth.clientApiKey | quote }}
  STATIC_WEBHOOK_API_KEY: {{ .Values.staticAuth.webhookApiKey | quote }}
  STATIC_AGENT_API_KEY: {{ .Values.staticAuth.agentApiKey | quote }}
{{- end }}
---
{{- if eq .Values.authMode "static" }}
# bank-client's session-signing key is deliberately not in here (or anywhere
# else Kubernetes- or Connect-managed): it's never presented to another
# party — bank-client only ever signs and verifies its own cookies — so
# there's no reason for it to be a long-lived, mounted credential at all.
# bank-client/main.go generates one in memory at startup instead when
# SESSION_SECRET isn't set (the only cost: existing sessions don't survive a
# restart, fine for a single-replica demo deployment). This also means a
# coarse "does this workload mount a secret" check (e.g. cofide-observer)
# correctly sees nothing to flag once in spiffe mode, since this whole Secret
# only exists in static mode now.
apiVersion: v1
kind: Secret
metadata:
  name: bank-client-auth
  labels:
    {{- include "bank.labels" . | nindent 4 }}
type: Opaque
data:
  STATIC_CLIENT_API_KEY: {{ .Values.staticAuth.clientApiKey | b64enc }}
{{- end }}
