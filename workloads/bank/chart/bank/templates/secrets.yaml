{{- if eq .Values.authMode "static" }}
apiVersion: v1
kind: Secret
metadata:
  name: bank-server-auth
  labels:
    {{- include "bank.labels" . | nindent 4 }}
type: Opaque
stringData:
  STATIC_CLIENT_API_KEY: {{ .Values.staticAuth.clientApiKey | quote }}
  STATIC_WEBHOOK_API_KEY: {{ .Values.staticAuth.webhookApiKey | quote }}
  STATIC_AGENT_API_KEY: {{ .Values.staticAuth.agentApiKey | quote }}
{{- end }}
---
# bank-client's secret is always rendered — OIDC sign-in and the session
# signing key apply in both auth modes, unlike bank-server's static keys
# above, which only exist in static mode.
apiVersion: v1
kind: Secret
metadata:
  name: bank-client-auth
  labels:
    {{- include "bank.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if eq .Values.authMode "static" }}
  STATIC_CLIENT_API_KEY: {{ .Values.staticAuth.clientApiKey | quote }}
  {{- end }}
  SESSION_SECRET: {{ .Values.session.secret | quote }}
