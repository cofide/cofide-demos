apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-server
  labels:
    app: bank-server
    {{- include "bank.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-server
  template:
    metadata:
      labels:
        app: bank-server
        {{- include "bank.labels" . | nindent 8 }}
    spec:
      serviceAccountName: bank-server
      containers:
        - name: bank-server
          image: {{ .Values.image.prefix }}bank-server:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
            - containerPort: {{ .Values.server.clientApiPort }}
            - containerPort: {{ .Values.server.webhookPort }}
          env:
            - name: AUTH_MODE
              value: {{ .Values.authMode | quote }}
            - name: CLIENT_API_ADDRESS
              value: ":{{ .Values.server.clientApiPort }}"
            # Shared by bank-lambda and bank-agent — see values.yaml.
            - name: WEBHOOK_ADDRESS
              value: ":{{ .Values.server.webhookPort }}"
            {{- if eq .Values.authMode "spiffe" }}
            - name: SPIFFE_ENDPOINT_SOCKET
              value: {{ .Values.spiffe.socketPath | quote }}
            - name: CLIENT_SPIFFE_ID
              value: {{ required "spiffe.clientSpiffeId is required when authMode=spiffe" .Values.spiffe.clientSpiffeId | quote }}
            - name: LAMBDA_SPIFFE_ID
              value: {{ required "spiffe.lambdaSpiffeId is required when authMode=spiffe" .Values.spiffe.lambdaSpiffeId | quote }}
            # Optional, no `required` guard: bank-agent has its own separate
            # deployment bootstrap (see the README), so bank-server must be
            # able to run in spiffe mode before it's configured — it just
            # disables the agent-facing listener until both are set.
            - name: AGENT_AUTHORIZED_ACTOR
              value: {{ .Values.spiffe.agentAuthorizedActor | quote }}
            - name: CREDEX_DISCOVERY_URL
              value: {{ .Values.credex.discoveryUrl | quote }}
            {{- end }}
          {{- if eq .Values.authMode "static" }}
          envFrom:
            - secretRef:
                name: bank-server-auth
          {{- end }}
          {{- if eq .Values.authMode "spiffe" }}
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
          {{- end }}
      {{- if eq .Values.authMode "spiffe" }}
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
      {{- end }}
