<title>Cofide Bank Demo — Live Logs</title>
<meta charset="utf-8" />
<style>
  :root {
    color-scheme: dark;
    --bg: #0b0d12;
    --panel-bg: #12151c;
    --border: #262b38;
    --text: #d6dae3;
    --muted: #7b8496;
    --accent: #5eb0ef;
    --warn: #e6b95c;
    --error: #e2685f;
    --ok: #59c78a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 1rem;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.01em;
  }
  header span {
    color: var(--muted);
    font-size: 0.8rem;
  }
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    height: calc(100% - 3rem);
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; grid-template-rows: repeat(4, 1fr); }
  }
  .panel {
    background: var(--panel-bg);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.85rem;
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .panel-header .name {
    font-weight: 600;
    font-size: 0.85rem;
  }
  .panel-header .caption {
    color: var(--muted);
    font-size: 0.75rem;
  }
  .panel-header .spacer { flex: 1; }
  button.clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  button.clear-btn:hover {
    color: var(--text);
    border-color: var(--accent);
  }
  header button.clear-btn {
    margin-left: auto;
    align-self: center;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex: none;
  }
  .dot.connected { background: var(--ok); }
  .dot.error { background: var(--error); }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem 0.85rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.78rem;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .panel-body .line { border-left: 2px solid transparent; padding-left: 0.4rem; }
  .panel-body .line.warn { border-left-color: var(--warn); color: var(--warn); }
  .panel-body .line.error { border-left-color: var(--error); color: var(--error); }
  .panel-body .line.meta { color: var(--muted); font-style: italic; }
</style>

<header>
  <h1>Cofide Bank Demo</h1>
  <span>live logs — bank-client · bank-server · bank-lambda · bank-agent</span>
  <button class="clear-btn" id="clear-all">Clear all</button>
</header>

<main id="grid"></main>

<script>
  const PANELS = [
    { id: "bank-client", name: "bank-client", caption: "web dashboard (kubectl)" },
    { id: "bank-server", name: "bank-server", caption: "ledger API (kubectl)" },
    { id: "lambda", name: "bank-lambda", caption: "payments webhook (CloudWatch)" },
    { id: "agent", name: "bank-agent", caption: "spending-insights agent (CloudWatch)" },
  ];

  const grid = document.getElementById("grid");

  for (const p of PANELS) {
    const panel = document.createElement("div");
    panel.className = "panel";
    panel.innerHTML = `
      <div class="panel-header">
        <div class="dot" id="dot-${p.id}"></div>
        <div class="name">${p.name}</div>
        <div class="caption">${p.caption}</div>
        <div class="spacer"></div>
        <button class="clear-btn" data-clear="${p.id}">Clear</button>
      </div>
      <div class="panel-body" id="body-${p.id}"></div>
    `;
    grid.appendChild(panel);

    panel.querySelector(`[data-clear="${p.id}"]`).addEventListener("click", () => clearPanel(p.id));
    connect(p.id);
  }

  document.getElementById("clear-all").addEventListener("click", () => {
    for (const p of PANELS) clearPanel(p.id);
  });

  function clearPanel(id) {
    document.getElementById(`body-${id}`).replaceChildren();
  }

  function classify(line) {
    if (/\b(ERROR|error_details|Rejected)\b/.test(line)) return "error";
    if (/\b(WARN|WARNING)\b/.test(line)) return "warn";
    if (line.startsWith("---")) return "meta";
    return "";
  }

  function connect(id) {
    const body = document.getElementById(`body-${id}`);
    const dot = document.getElementById(`dot-${id}`);
    const source = new EventSource(`/stream/${id}`);

    source.onopen = () => dot.className = "dot connected";
    source.onerror = () => dot.className = "dot error";

    source.onmessage = (evt) => {
      const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
      const div = document.createElement("div");
      div.className = "line " + classify(evt.data);
      div.textContent = evt.data;
      body.appendChild(div);
      while (body.childElementCount > 500) body.removeChild(body.firstChild);
      if (atBottom) body.scrollTop = body.scrollHeight;
    };
  }
</script>
